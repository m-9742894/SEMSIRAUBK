<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesi Peribadi | UBK SEMSIRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d2ff;
            --glow: rgba(0, 210, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #0a192f, #000000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            color: white;
            overflow-x: hidden;
            padding: 20px;
        }

        /* --- ANIMASI BACKGROUND ENERGETIK --- */
        .mood-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.15), transparent 40%);
            z-index: -1;
            filter: blur(80px);
            animation: pulse 10s infinite alternate;
        }

        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.3;
            animation: moveUp 5s linear infinite;
        }

        @keyframes moveUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.1); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            text-align: center;
            margin: 20px 0;
            text-shadow: 0 0 20px var(--accent);
            letter-spacing: 2px;
        }

        /* --- 3D GLASS CONTAINER UNTUK GOOGLE FORM --- */
        .glass-frame {
            position: relative;
            width: 100%;
            max-width: 850px;
            height: 80vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 30px;
            padding: 10px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        /* Iframe Borang */
        .glass-frame iframe {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            border: none;
            background: #fff; /* Memberi kontras untuk borang */
        }

        .btn-back {
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--accent);
            transition: 0.3s;
            margin-bottom: 30px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .btn-back:hover {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 25px var(--accent);
            transform: translateY(-3px);
        }

        /* Mobile View */
        @media (max-width: 600px) {
            .glass-frame { height: 75vh; }
            h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="mood-bg"></div>
    <div class="particles" id="particleContainer"></div>

    <h1>BORANG KHIDMAT KAUNSELING</h1>

    <div class="glass-frame" id="form3D">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdPISoMkLwo4K3UzmwobI1Cz7aRqzZFDUcEGRmqRmF81J5fmA/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
    </div>

    <a href="mood-checkin.html" class="btn-back">← Kembali</a>

    <script>
        // Penjana zarah energetik
        const pContainer = document.getElementById('particleContainer');
        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 5 + 2 + 'px';
            p.style.width = size;
            p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 3 + 2 + 's';
            pContainer.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }
        setInterval(createParticle, 300);

        // Efek Tilt 3D pada Borang (Ikut pergerakan mouse)
        const card = document.getElementById('form3D');
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.clientX) / 100;
            let yAxis = (window.innerHeight / 2 - e.clientY) / 100;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
    </script>
</body>
</html>
