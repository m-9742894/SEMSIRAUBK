<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Memori | UBK SEMSIRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #feada6 100%);
            min-height: 100vh;
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        .header {
            text-align: center;
            padding: 60px 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: clamp(1.8rem, 8vw, 3rem);
            text-shadow: 4px 4px 0px rgba(209, 80, 118, 0.3);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 50px;
            padding: 20px 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .photo-card {
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            animation: floatSlow var(--time) infinite ease-in-out alternate;
            transform: rotate(var(--rotation));
            cursor: pointer;
        }

        .photo-card:hover {
            transform: scale(1.1) rotate(0deg) translateY(-10px) !important;
            z-index: 100;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            background: #f0f0f0;
            display: block;
        }

        .photo-card::after {
            content: "♥ Memoria";
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #ff9a9e;
            font-weight: bold;
        }

        @keyframes floatSlow {
            0% { transform: translateY(0) rotate(var(--rotation)); }
            100% { transform: translateY(-20px) rotate(var(--rotation-end)); }
        }

        /* --- STYLES UNTUK ZOOM (LIGHTBOX) --- */
        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 5px solid white;
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .btn-back {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            background: #fff;
            color: #d15076;
            text-transform: uppercase;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 2px solid #ff9a9e;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #ff9a9e;
            color: white;
        }

        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 10px; }
            .photo-card img { height: 150px; }
        }
    </style>
</head>
<body>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>

    <div class="header">
        <h1>GALERI MEMORI</h1>
        <p style="color: white; opacity: 0.9;">Koleksi momen indah UBK SEMSIRA</p>
    </div>

    <div class="gallery-grid" id="galleryContainer">
        </div>

    <a href="portal-utama.html" class="btn-back">← KEMBALI</a>

    <script>
        const container = document.getElementById('galleryContainer');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const total = 100;

        for (let i = 1; i <= total; i++) {
            const card = document.createElement('div');
            card.className = 'photo-card';
            
            const rotation = (Math.random() * 10 - 5) + 'deg';
            const rotationEnd = (Math.random() * 10 - 5) + 'deg';
            const time = (Math.random() * 3 + 3) + 's';

            card.style.setProperty('--rotation', rotation);
            card.style.setProperty('--rotation-end', rotationEnd);
            card.style.setProperty('--time', time);

            // Path gambar: aktiviti1.png - aktiviti100.png
            const imgPath = `aktiviti${i}.png`;

            card.innerHTML = `
                <img src="${imgPath}" alt="Aktiviti ${i}" 
                     onerror="this.src='https://via.placeholder.com/300x250?text=Memori+${i}'">
            `;

            // Fungsi Zoom bila tekan kad
            card.onclick = () => {
                lightboxImg.src = imgPath;
                lightbox.style.display = 'flex';
            };
            
            container.appendChild(card);
        }
    </script>
</body>
</html>
