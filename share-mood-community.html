<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Mood Wall | UBK SEMSIRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff007b; /* Warna pink bertenaga untuk komuniti */
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #1a0a1f, #000000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            color: white;
            /* Membolehkan skrol untuk peranti kecil */
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            scroll-behavior: smooth;
        }

        /* --- ANIMASI BACKGROUND --- */
        .mood-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 0, 123, 0.15), transparent 40%);
            z-index: -1;
            filter: blur(80px);
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.1); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.1rem, 5vw, 1.8rem);
            text-align: center;
            margin: 20px 0;
            text-shadow: 0 0 20px var(--accent);
            letter-spacing: 2px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            perspective: 1000px;
        }

        /* --- 3D GLASS BOX STYLING --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 0, 123, 0.3);
            border-radius: 30px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
            position: relative;
        }

        .label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--accent);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        /* --- LIVE BOARD AREA (Atas) --- */
        .live-board {
            position: relative;
            padding-bottom: 56.25%; /* Ratio 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            background: #000;
        }

        /* --- INPUT AREA (Bawah) --- */
        .input-frame {
            height: 500px; /* Ruang yang cukup untuk keyboard telefon */
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
        }

        iframe {
            border: none;
        }

        .btn-back {
            margin: 40px 0;
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--accent);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-back:hover {
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent);
            transform: translateY(-3px);
        }

        /* --- MOBILE ADJUSTMENT --- */
        @media (max-width: 600px) {
            .container { gap: 20px; }
            .input-frame { height: 450px; }
            h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="mood-bg"></div>

    <h1>KOMUNITI LUAHAN PERASAAN</h1>

    <div class="container">
        
        <div class="glass-card" id="card1">
            <div class="label"><span>●</span> LIVE MOOD BOARD</div>
            <div class="live-board">
                <iframe sandbox='allow-popups allow-scripts allow-same-origin allow-presentation' allowfullscreen='true' allowtransparency='true' frameborder='0' src='https://www.mentimeter.com/app/presentation/alsxnboosjwj15nkfhiuxph53hg5corj/embed' style='position: absolute; top: 0; left: 0; width: 100%; height: 100%;'></iframe>
            </div>
        </div>

        <div class="glass-card" id="card2">
            <div class="label"><span>●</span> TULIS PERASAAN ANDA DI SINI</div>
            <div class="input-frame">
                <iframe src="https://www.menti.com/alhbehhkdit2" width="100%" height="100%"></iframe>
            </div>
        </div>

    </div>

    <a href="mood-checkin.html" class="btn-back">← Kembali</a>

    <script>
        // Efek Tilt 3D Ringan pada Desktop
        if (window.innerWidth > 1024) {
            const cards = document.querySelectorAll('.glass-card');
            document.addEventListener('mousemove', (e) => {
                let xAxis = (window.innerWidth / 2 - e.clientX) / 100;
                let yAxis = (window.innerHeight / 2 - e.clientY) / 100;
                cards.forEach(card => {
                    card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                });
            });
        }
    </script>
</body>
</html>
