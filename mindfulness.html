<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindfulness Zone | UBK SEMSIRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Warna Pastel Pelangi yang Ceria */
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            /* Tukar ke min-height supaya boleh scroll */
            min-height: 100vh;
            font-family: 'Fredoka', sans-serif;
            overflow-x: hidden;
            /* Benarkan scroll vertical */
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            perspective: 1000px;
        }

        /* --- BACKGROUND ANIMATION (Fixed supaya tak ganggu scroll) --- */
        .floating-shapes {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: floatUp 10s infinite linear;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #2c3e50;
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0px #fff;
            z-index: 10;
        }

        /* --- CONTAINER KOTAK MAINAN --- */
        .toy-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            flex-grow: 1; /* Ambil ruang yang ada */
            padding: 20px 0;
        }

        /* --- STYLE KOTAK MAINAN (3D EFFECT) --- */
        .toy-box {
            background: white;
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            position: relative;
            width: 100%;
            max-width: 380px; /* Saiz ideal untuk phone & desktop */
            box-shadow: 0 20px 0px rgba(0,0,0,0.05), 0 30px 50px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Menyenget sikit 3D */
            transform: rotateX(10deg) rotateY(-5deg); 
            border: 4px solid #fff;
            animation: boxFloat 4s infinite ease-in-out alternate;
            margin: 10px;
        }

        @keyframes boxFloat {
            from { transform: translateY(0) rotateX(10deg) rotateY(-5deg); }
            to { transform: translateY(-15px) rotateX(12deg) rotateY(2deg); }
        }

        .toy-box:hover {
            transform: scale(1.02) rotateX(0deg) rotateY(0deg) translateY(-10px);
            box-shadow: 0 40px 60px rgba(0,0,0,0.15);
        }

        .box-1 { border-bottom: 10px solid #ff7675; }

        .game-icon {
            font-size: clamp(60px, 15vw, 80px);
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        h3 {
            color: #2d3436;
            font-size: clamp(1.3rem, 5vw, 1.6rem);
            margin-bottom: 15px;
        }

        p {
            color: #636e72;
            font-size: clamp(0.9rem, 4vw, 1rem);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* --- BUTTON MAIN --- */
        .btn-play {
            display: inline-block;
            background: #ff7675;
            color: white;
            text-decoration: none;
            padding: 15px 45px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 118, 117, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            max-width: 100%;
        }

        .btn-play:hover {
            transform: scale(1.1);
            filter: brightness(1.1);
            box-shadow: 0 10px 25px rgba(255, 118, 117, 0.6);
        }

        .btn-back {
            margin-top: 30px;
            color: #2c3e50;
            text-decoration: none;
            font-weight: bold;
            background: rgba(255,255,255,0.5);
            padding: 12px 25px;
            border-radius: 50px;
            transition: 0.3s;
            border: 1px solid transparent;
            z-index: 10;
        }

        .btn-back:hover { 
            background: white; 
            border-color: #a1c4fd;
        }

        /* Tablet & Mobile Tweaks */
        @media (max-width: 480px) {
            body { padding: 30px 15px; }
            .toy-box { padding: 30px 20px; }
            h1 { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="floating-shapes" id="bg-shapes"></div>

    <h1>MINDFULNESS ZONE</h1>

    <div class="toy-container">
        <div class="toy-box box-1">
            <div class="game-icon">🎡</div>
            <h3>Wheel of Emotions</h3>
            <p>Pusing roda untuk kenali perasaan anda hari ini dengan cara yang menyeronokkan dan penuh ceria!</p>
            <a href="wheel-game.html" class="btn-play">MAIN</a>
        </div>
    </div>

    <a href="portal-utama.html" class="btn-back">← Kembali ke Menu Utama</a>

    <script>
        // Jana buih-buih hiasan di background
        const bg = document.getElementById('bg-shapes');
        // Kurangkan jumlah buih di mobile untuk performance
        const bubbleCount = window.innerWidth < 480 ? 12 : 20;
        
        for (let i = 0; i < bubbleCount; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 60 + 20 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.animationDelay = Math.random() * 5 + 's';
            bubble.style.animationDuration = Math.random() * 5 + 7 + 's';
            bg.appendChild(bubble);
        }
    </script>
</body>
</html>
